version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: study-tracker-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongodb_password_change_me
      MONGO_INITDB_DATABASE: study-tracker
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - study-tracker-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-tracker-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:mongodb_password_change_me@mongo:27017/study-tracker?authSource=admin
      JWT_SECRET: your_jwt_secret_change_in_production_12345
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - study-tracker-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: study-tracker-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - study-tracker-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: study-tracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - study-tracker-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  study-tracker-network:
    driver: bridge

volumes:
  mongo-data:
  mongo-config:
  redis-data:
